<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Template Editor — Longden Doors</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --brand:       #111111;
    --brand-dark:  #333333;
    --brand-faint: #f0f0f0;
    --ground:      #f2f0ec;
    --surface:     #ffffff;
    --text:        #1c1c19;
    --muted:       #6b6960;
    --border:      #ddd9d0;
    --success:     #16a34a;
    --danger:      #b91c1c;
    --warn:        #92400e;
}

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--ground);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
}

.topbar {
    background: var(--brand);
    color: white;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.topbar-title { font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
.topbar-sub   { font-size: 0.68rem; opacity: 0.65; margin-top: 1px; }
.topbar-right { display: flex; gap: 0.6rem; align-items: center; }

.btn-topbar {
    border: none;
    border-radius: 4px;
    padding: 0.48rem 1.1rem;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
}
.btn-topbar:active { transform: scale(0.97); }
.btn-topbar:disabled { opacity: 0.45; cursor: default; }

.btn-add     { background: rgba(255,255,255,0.18); color: white; }
.btn-add:hover:not(:disabled) { background: rgba(255,255,255,0.28); }

.btn-publish { background: white; color: var(--brand); }
.btn-publish:hover:not(:disabled) { background: #e8f2ec; }
.btn-publish.success { background: #dcfce7; color: var(--success); }

main {
    max-width: 820px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 4rem;
}

/* ── Section heading ── */
.section-head {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
}
.section-head:first-child { margin-top: 0; }
.section-name { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--brand); white-space: nowrap; }
.section-rule { flex: 1; height: 1px; background: var(--brand); opacity: 0.2; }

/* ── Template card ── */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 0.75rem;
    overflow: hidden;
}

.card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.5rem 0.9rem;
    background: var(--brand-faint);
    border-bottom: 1px solid var(--border);
}

.card-head-left { display: flex; align-items: center; gap: 0.6rem; }

.card-name-input {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--brand);
    border: none;
    background: transparent;
    font-family: inherit;
    width: 220px;
    padding: 0.15rem 0.3rem;
    border-radius: 3px;
    transition: background 0.12s;
}
.card-name-input:hover { background: rgba(0,0,0,0.08); }
.card-name-input:focus { outline: none; background: white; box-shadow: 0 0 0 2px rgba(0,0,0,0.2); }

.cat-select {
    font-size: 0.72rem;
    color: var(--muted);
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 0.18rem 0.5rem;
    background: white;
    font-family: inherit;
    cursor: pointer;
}
.cat-select:focus { outline: none; border-color: var(--brand); }
.btn-publish { background: white; color: var(--brand); }
.btn-publish:hover:not(:disabled) { background: #eeeeee; }

.btn-delete {
    background: none;
    border: none;
    color: #ccc;
    font-size: 1rem;
    cursor: pointer;
    padding: 0.2rem 0.3rem;
    border-radius: 3px;
    line-height: 1;
    transition: color 0.12s, background 0.12s;
}
.btn-delete:hover { color: var(--danger); background: #fef2f2; }

.card-body { padding: 0.85rem 0.9rem 0.75rem; }

/* Subject input */
.subject-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
}
.subject-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
.subject-input {
    flex: 1;
    padding: 0.38rem 0.6rem;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-size: 0.85rem;
    color: var(--text);
    background: #fdfdfc;
    font-family: inherit;
}
.subject-input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }

/* Body textarea */
.body-label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }

textarea {
    width: 100%;
    padding: 0.6rem 0.7rem;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    font-size: 0.88rem;
    line-height: 1.7;
    color: var(--text);
    background: #fdfdfc;
    resize: vertical;
    min-height: 100px;
    font-family: inherit;
    transition: border-color 0.12s;
}
textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 2px rgba(0,0,0,0.1); }

/* Placeholder table */
.ph-section { margin-top: 0.75rem; }
.ph-title { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
.ph-empty { font-size: 0.8rem; color: #bbb; font-style: italic; }

table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th {
    text-align: left;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 0.3rem 0.5rem;
    background: var(--ground);
    border: 1px solid var(--border);
}
td {
    padding: 0.28rem 0.5rem;
    border: 1px solid var(--border);
    vertical-align: middle;
}
td:first-child {
    font-family: Consolas, 'Courier New', monospace;
    font-size: 0.78rem;
    color: var(--brand);
    background: var(--brand-faint);
    white-space: nowrap;
    width: 160px;
}
.td-input {
    width: 100%;
    border: none;
    padding: 0.18rem 0.3rem;
    font-size: 0.82rem;
    font-family: inherit;
    color: var(--text);
    background: transparent;
    border-radius: 2px;
}
.td-input:focus { outline: none; background: white; box-shadow: 0 0 0 1px var(--brand); }

.opt-check { cursor: pointer; }

/* ── Toast ── */
#toast {
    position: fixed;
    bottom: 1.25rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: white;
    padding: 0.55rem 1.1rem;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
}
#toast.show { opacity: 1; }
#toast.ok   { background: var(--success); }
#toast.err  { background: var(--danger); }
</style>
</head>
<body>

<div class="topbar">
    <div>
        <div class="topbar-title">Longden Doors</div>
        <div class="topbar-sub">Template Editor</div>
    </div>
    <div class="topbar-right">
        <button class="btn-topbar btn-add" onclick="addTemplate()">+ Add template</button>
        <button class="btn-topbar btn-publish" id="publishBtn" onclick="publish()">Publish to live</button>
    </div>
</div>

<main id="main"></main>

<div id="toast"></div>

<script>
if (location.protocol === 'file:') { location.href = 'http://127.0.0.1:3457/editor.html'; }

const CATEGORIES = ['Scheduling', 'Project Progress', 'Delivery', 'Enquiries', 'Technical'];

let templates = [];

// ── Load (retries while server warms up) ──────────────
async function load(attempt) {
    attempt = attempt || 1;
    try {
        const r = await fetch('/templates.json');
        if (!r.ok) throw new Error('Server error ' + r.status);
        const data = await r.json();
        templates = data.templates || [];
        render();
    } catch (e) {
        if (attempt < 6) {
            setTimeout(() => load(attempt + 1), 1500);
        } else {
            toast('Could not load templates — make sure start-editor.bat is running.', 'err', 10000);
            render();
        }
    }
}

// ── Render all ────────────────────────────────────────
function render() {
    const main = document.getElementById('main');
    main.innerHTML = '';

    const byCategory = {};
    templates.forEach((t, i) => {
        if (!byCategory[t.category]) byCategory[t.category] = [];
        byCategory[t.category].push({ t, i });
    });

    // Render in category order (defined + any extras)
    const cats = [...new Set([...CATEGORIES, ...Object.keys(byCategory)])];
    cats.forEach(cat => {
        if (!byCategory[cat]) return;
        const head = document.createElement('div');
        head.className = 'section-head';
        head.innerHTML = `<span class="section-name">${cat}</span><div class="section-rule"></div>`;
        main.appendChild(head);
        byCategory[cat].forEach(({ t, i }) => main.appendChild(buildCard(t, i)));
    });
}

// ── Build card ────────────────────────────────────────
function buildCard(t, idx) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = idx;

    // Head
    const head = document.createElement('div');
    head.className = 'card-head';

    const nameInput = document.createElement('input');
    nameInput.className = 'card-name-input';
    nameInput.type = 'text';
    nameInput.value = t.name;
    nameInput.placeholder = 'Template name';
    nameInput.addEventListener('input', () => { templates[idx].name = nameInput.value; });

    const catSel = document.createElement('select');
    catSel.className = 'cat-select';
    CATEGORIES.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        if (c === t.category) opt.selected = true;
        catSel.appendChild(opt);
    });
    catSel.addEventListener('change', () => { templates[idx].category = catSel.value; render(); });

    const delBtn = document.createElement('button');
    delBtn.className = 'btn-delete';
    delBtn.title = 'Delete template';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => {
        if (confirm(`Delete "${t.name}"?`)) {
            templates.splice(idx, 1);
            render();
        }
    });

    const headLeft = document.createElement('div');
    headLeft.className = 'card-head-left';
    headLeft.appendChild(nameInput);
    headLeft.appendChild(catSel);
    head.appendChild(headLeft);
    head.appendChild(delBtn);

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    // Subject row
    const subjRow = document.createElement('div');
    subjRow.className = 'subject-row';
    subjRow.innerHTML = '<span class="subject-label">Subject line</span>';
    const subjInp = document.createElement('input');
    subjInp.type = 'text';
    subjInp.className = 'subject-input';
    subjInp.placeholder = 'Leave blank if none';
    subjInp.value = t.subject || '';
    subjInp.addEventListener('input', () => { templates[idx].subject = subjInp.value; });
    subjRow.appendChild(subjInp);
    body.appendChild(subjRow);

    // Body textarea
    const bodyLabel = document.createElement('div');
    bodyLabel.className = 'body-label';
    bodyLabel.textContent = 'Body';
    body.appendChild(bodyLabel);

    const ta = document.createElement('textarea');
    ta.rows = 8;
    ta.value = t.body || '';
    ta.addEventListener('input', () => {
        templates[idx].body = ta.value;
        syncPlaceholders(idx, phTable);
    });
    body.appendChild(ta);

    // Placeholder table
    const phSection = document.createElement('div');
    phSection.className = 'ph-section';
    const phTitle = document.createElement('div');
    phTitle.className = 'ph-title';
    phTitle.textContent = 'Placeholders';
    phSection.appendChild(phTitle);

    const phTable = document.createElement('div');
    phTable.className = 'ph-table-wrap';
    phSection.appendChild(phTable);
    body.appendChild(phSection);

    renderPlaceholders(idx, phTable);

    card.appendChild(head);
    card.appendChild(body);
    return card;
}

// ── Placeholder table ─────────────────────────────────
function renderPlaceholders(idx, container) {
    const phs = templates[idx].placeholders || [];
    container.innerHTML = '';

    if (!phs.length) {
        container.innerHTML = '<div class="ph-empty">No placeholders — use {KEY_NAME} in the body to add one.</div>';
        return;
    }

    const tbl = document.createElement('table');
    tbl.innerHTML = `<thead><tr><th>Token</th><th>Label shown to user</th><th>Hint text</th><th style="width:60px;text-align:center">Optional</th></tr></thead>`;
    const tbody = document.createElement('tbody');

    phs.forEach((ph, pi) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>{${ph.key}}</td>
            <td><input class="td-input" type="text" value="${esc(ph.label)}" placeholder="Label"></td>
            <td><input class="td-input" type="text" value="${esc(ph.hint || '')}" placeholder="e.g. Feb/March 2026"></td>
            <td style="text-align:center"><input class="opt-check" type="checkbox" ${ph.optional ? 'checked' : ''}></td>
        `;
        const [, labelInp, hintInp, optCell] = tr.querySelectorAll('input');
        labelInp.addEventListener('input', () => { templates[idx].placeholders[pi].label = labelInp.value; });
        hintInp.addEventListener('input',  () => { templates[idx].placeholders[pi].hint  = hintInp.value; });
        optCell.addEventListener('change', () => { templates[idx].placeholders[pi].optional = optCell.checked; });
        tbody.appendChild(tr);
    });

    tbl.appendChild(tbody);
    container.appendChild(tbl);
}

function syncPlaceholders(idx, container) {
    const body = templates[idx].body || '';
    const found = [];
    const regex = /\{(\w+)\}/g;
    let m;
    while ((m = regex.exec(body)) !== null) {
        if (!found.includes(m[1])) found.push(m[1]);
    }

    const existing = templates[idx].placeholders || [];
    const existMap = {};
    existing.forEach(p => { existMap[p.key] = p; });

    templates[idx].placeholders = found.map(key =>
        existMap[key] || { key, label: humanize(key), hint: '', optional: false }
    );

    renderPlaceholders(idx, container);
}

function humanize(key) {
    const words = key.toLowerCase().split('_');
    words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
    return words.join(' ');
}

function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Add template ──────────────────────────────────────
function addTemplate() {
    const t = {
        id: 'template-' + Date.now(),
        name: 'New template',
        category: 'Scheduling',
        subject: '',
        body: '',
        placeholders: []
    };
    templates.push(t);
    render();
    setTimeout(() => {
        const cards = document.querySelectorAll('.card');
        const last = cards[cards.length - 1];
        last?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        last?.querySelector('.card-name-input')?.focus();
    }, 50);
}

// ── Publish ───────────────────────────────────────────
async function publish() {
    const btn = document.getElementById('publishBtn');
    btn.disabled = true;
    btn.textContent = 'Publishing…';

    const payload = JSON.stringify({ templates }, null, 2);

    try {
        const r = await fetch('/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: payload
        });
        if (!r.ok) {
            const err = await r.text();
            throw new Error(err || 'Server error ' + r.status);
        }
        btn.textContent = 'Published!';
        btn.classList.add('success');
        toast('Published — live in the add-in within ~1 minute', 'ok', 4000);
        setTimeout(() => {
            btn.textContent = 'Publish to live';
            btn.classList.remove('success');
            btn.disabled = false;
        }, 3000);
    } catch (e) {
        toast(e.message, 'err', 6000);
        btn.textContent = 'Publish to live';
        btn.disabled = false;
    }
}

// ── Toast ─────────────────────────────────────────────
function toast(msg, type, duration) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + (type || '');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { el.className = ''; }, duration || 3000);
}

load();
</script>
</body>
</html>
