<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Templates — Longden Doors</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f0ec;
            min-height: 100vh;
            font-size: 14px;
        }

        header {
            background: #2b5a39;
            color: white;
            padding: 0.9rem 1.1rem 0.75rem;
        }
        header h1 { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
        header p  { font-size: 0.72rem; opacity: 0.7; margin-top: 0.1rem; }

        /* ── Category bar ── */
        .cat-bar {
            display: flex;
            gap: 0.4rem;
            padding: 0.6rem 0.9rem;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid #ddd9d0;
            scrollbar-width: none;
        }
        .cat-bar::-webkit-scrollbar { display: none; }

        .cat-btn {
            white-space: nowrap;
            padding: 0.28rem 0.7rem;
            border-radius: 20px;
            border: 1.5px solid #ccc;
            background: white;
            color: #555;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
        }
        .cat-btn.active      { background: #2b5a39; color: white; border-color: #2b5a39; }
        .cat-btn.cat-fav     { border-color: #d97706; color: #d97706; }
        .cat-btn.cat-fav.active { background: #d97706; color: white; border-color: #d97706; }
        .cat-btn.cat-mine    { border-color: #2563eb; color: #2563eb; }
        .cat-btn.cat-mine.active { background: #2563eb; color: white; border-color: #2563eb; }

        /* ── Browse list ── */
        #templateList { padding: 0.65rem 0.9rem; }

        .tpl-item {
            display: flex;
            align-items: center;
            background: white;
            border: 1.5px solid #ddd9d0;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: border-color 0.12s, box-shadow 0.12s;
            overflow: hidden;
        }
        .tpl-item:hover { border-color: #2b5a39; box-shadow: 0 1px 4px rgba(43,90,57,0.12); }

        .tpl-body { flex: 1; padding: 0.62rem 0.75rem; min-width: 0; }
        .tpl-name { font-size: 0.88rem; font-weight: 600; color: #1a1a1a; }
        .tpl-meta { font-size: 0.67rem; color: #888; margin-top: 0.12rem; text-transform: uppercase; letter-spacing: 0.04em; }

        .tpl-actions { display: flex; flex-direction: column; }

        .tpl-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem 0.6rem;
            font-size: 0.95rem;
            line-height: 1;
            color: #ccc;
            transition: color 0.12s, background 0.12s;
        }
        .tpl-btn:hover { background: #f5f5f3; }
        .tpl-btn.star         { color: #ccc; }
        .tpl-btn.star.active  { color: #d97706; }
        .tpl-btn.edit         { color: #2563eb; font-size: 0.7rem; font-weight: 700; border-top: 1px solid #e5e3df; }
        .tpl-btn.edit:hover   { background: #eff6ff; }
        .tpl-btn.del          { color: #b91c1c; font-size: 0.7rem; font-weight: 700; border-top: 1px solid #e5e3df; }
        .tpl-btn.del:hover    { background: #fef2f2; }

        .add-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.6rem 0.85rem;
            background: #eff6ff;
            border: 1.5px dashed #93c5fd;
            border-radius: 4px;
            color: #2563eb;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.12s;
            margin-bottom: 0.5rem;
        }
        .add-btn:hover { background: #dbeafe; }

        .empty-msg { font-size: 0.82rem; color: #aaa; padding: 0.5rem 0; }

        /* ── Shared fill/create header ── */
        .pane-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: white;
            border-bottom: 1px solid #ddd9d0;
            padding: 0.55rem 0.75rem;
        }
        .back-btn {
            background: none;
            border: none;
            color: #2b5a39;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            white-space: nowrap;
            transition: background 0.12s;
            flex-shrink: 0;
        }
        .back-btn:hover { background: #eef3f0; }
        .pane-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .header-edit-btn {
            background: none;
            border: 1px solid #93c5fd;
            border-radius: 3px;
            color: #2563eb;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.22rem 0.55rem;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.12s;
        }
        .header-edit-btn:hover { background: #eff6ff; }

        main { padding: 0.9rem; }

        /* ── Form fields ── */
        .field-label {
            font-size: 0.68rem;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.3rem;
        }
        .text-input, textarea {
            width: 100%;
            padding: 0.5rem 0.65rem;
            border: 1.5px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #1a1a1a;
            background: white;
            font-family: inherit;
            transition: border-color 0.12s;
        }
        .text-input:focus, textarea:focus {
            outline: none;
            border-color: #2b5a39;
            box-shadow: 0 0 0 2px rgba(43,90,57,0.12);
        }
        textarea { resize: vertical; line-height: 1.65; min-height: 110px; }

        .cat-select {
            width: 100%;
            padding: 0.5rem 0.65rem;
            border: 1.5px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #1a1a1a;
            background: white;
            font-family: inherit;
        }
        .cat-select:focus { outline: none; border-color: #2b5a39; box-shadow: 0 0 0 2px rgba(43,90,57,0.12); }

        .field-hint { font-size: 0.67rem; color: #aaa; margin-top: 0.2rem; margin-bottom: 0.85rem; }
        .form-field { margin-bottom: 0.85rem; }

        /* ── Subject section ── */
        #subjectSection {
            background: #f7f9f7;
            border: 1.5px solid #c9ddd0;
            border-radius: 4px;
            padding: 0.7rem 0.85rem;
            margin-bottom: 0.9rem;
        }
        #subjectVal {
            width: 100%;
            padding: 0.42rem 0.65rem;
            border: 1.5px solid #b8d4c0;
            border-radius: 4px;
            font-size: 0.88rem;
            color: #1a1a1a;
            background: white;
            font-family: inherit;
            margin-top: 0.35rem;
        }
        #subjectVal:focus { outline: none; border-color: #2b5a39; box-shadow: 0 0 0 2px rgba(43,90,57,0.12); }
        .check-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.77rem;
            color: #444;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        /* ── Placeholder chips (create mode) ── */
        .ph-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.4rem; }
        .ph-chip {
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.68rem;
            padding: 0.15rem 0.45rem;
            background: #eef3f0;
            border: 1px solid #c9ddd0;
            border-radius: 2px;
            color: #2b5a39;
        }
        .ph-none { font-size: 0.77rem; color: #bbb; font-style: italic; }

        /* ── Placeholder label editor (create mode) ── */
        .ph-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 0.4rem; }
        .ph-table th {
            text-align: left;
            font-size: 0.63rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.45rem;
            background: #f5f5f3;
            border: 1px solid #e0ddd7;
        }
        .ph-table td { padding: 0.22rem 0.45rem; border: 1px solid #e0ddd7; vertical-align: middle; }
        .ph-table td:first-child {
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.75rem;
            color: #2b5a39;
            background: #eef3f0;
            white-space: nowrap;
            width: 130px;
        }
        .td-inp {
            width: 100%;
            border: none;
            padding: 0.15rem 0.28rem;
            font-size: 0.8rem;
            font-family: inherit;
            background: transparent;
            border-radius: 2px;
        }
        .td-inp:focus { outline: none; background: white; box-shadow: 0 0 0 1px #2b5a39; }

        /* ── Divider ── */
        .divider { height: 1px; background: #ddd9d0; margin: 0.9rem 0; }

        /* ── Preview ── */
        .preview-box {
            background: white;
            border: 1.5px solid #ddd9d0;
            border-radius: 4px;
            padding: 0.75rem 0.85rem;
            font-size: 0.85rem;
            line-height: 1.7;
            color: #1a1a1a;
            white-space: pre-wrap;
            word-break: break-word;
            margin-bottom: 0.9rem;
            max-height: 220px;
            overflow-y: auto;
        }
        .preview-box .unfilled {
            color: #b91c1c;
            font-weight: 700;
        }
        .preview-box .filled {
            color: #1d4ed8;
            font-weight: 700;
            background: #eff6ff;
            border-radius: 2px;
            padding: 0 2px;
        }

        /* ── Buttons ── */
        .btn {
            display: block;
            width: 100%;
            padding: 0.62rem 0.75rem;
            font-size: 0.88rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: background 0.12s, transform 0.1s;
            text-align: center;
            margin-bottom: 0.4rem;
        }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: default; transform: none; }
        .btn-primary { background: #2b5a39; color: white; }
        .btn-primary:hover:not(:disabled) { background: #224830; }
        .btn-primary.success { background: #16a34a; }
        .btn-secondary { background: white; color: #333; border: 1.5px solid #ccc; }
        .btn-secondary:hover { background: #f5f5f3; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-blue:hover:not(:disabled) { background: #1d4ed8; }

        .status { margin-top: 0.4rem; font-size: 0.75rem; color: #16a34a; min-height: 1rem; text-align: center; }
        .status.err { color: #b91c1c; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <h1>Longden Doors</h1>
    <p>Email Templates</p>
</header>

<!-- ══════════════════════════════════════════════
     STATE 1 — BROWSE
══════════════════════════════════════════════ -->
<div id="stateBrowse">
    <div class="cat-bar" id="catBar"></div>
    <div id="templateList"></div>
</div>

<!-- ══════════════════════════════════════════════
     STATE 2 — FILL (use a template)
══════════════════════════════════════════════ -->
<div id="stateFill" class="hidden">
    <div class="pane-header">
        <button class="back-btn" id="fillBack">← Back</button>
        <span class="pane-title" id="fillName"></span>
        <button class="header-edit-btn hidden" id="fillEditBtn">Edit</button>
    </div>
    <main>
        <div id="subjectSection" class="hidden">
            <div class="field-label">Suggested subject</div>
            <input id="subjectVal" type="text">
            <label class="check-label">
                <input type="checkbox" id="applySubject"> Also set email subject
            </label>
        </div>
        <div id="placeholderForm"></div>
        <div class="divider"></div>
        <div class="field-label" style="margin-bottom:0.45rem">Preview</div>
        <div class="preview-box" id="preview"></div>
        <button class="btn btn-primary" id="insertBtn">Insert into email</button>
        <div class="status" id="status"></div>
    </main>
</div>

<!-- ══════════════════════════════════════════════
     STATE 3 — CREATE / EDIT personal template
══════════════════════════════════════════════ -->
<div id="stateCreate" class="hidden">
    <div class="pane-header">
        <button class="back-btn" id="createBack">← Back</button>
        <span class="pane-title" id="createTitle">New personal template</span>
    </div>
    <main>
        <div class="form-field">
            <div class="field-label">Template name</div>
            <input type="text" class="text-input" id="cName" placeholder="e.g. Chase sign-off">
        </div>
        <div class="form-field">
            <div class="field-label">Category</div>
            <select class="cat-select" id="cCat"></select>
        </div>
        <div class="form-field">
            <div class="field-label">Subject line <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></div>
            <input type="text" class="text-input" id="cSubject" placeholder="Leave blank if none">
        </div>
        <div class="form-field">
            <div class="field-label">Body — use {FIELD_NAME} for dynamic parts</div>
            <textarea id="cBody" rows="8" placeholder="Dear {CLIENT_NAME},&#10;&#10;..."></textarea>
        </div>
        <div class="form-field" id="cPhSection">
            <div class="field-label">Detected placeholders — set labels</div>
            <div id="cPhContent"><span class="ph-none">None yet — add {KEY} tokens to the body above.</span></div>
        </div>
        <button class="btn btn-blue" id="savePersonalBtn">Save template</button>
    </main>
</div>

<script>
    // ── Constants ────────────────────────────────────────
    const SHARED_CATS = ['Scheduling', 'Project Progress', 'Delivery', 'Enquiries', 'Technical'];
    const LS_FAVS     = 'ld_favs';
    const LS_PERSONAL = 'ld_personal';

    // ── State ────────────────────────────────────────────
    let sharedTemplates = [];
    let activeCat       = '★ Favourites';
    let currentTemplate = null;
    let editingPersonalId = null;
    let officeReady     = false;

    // ── localStorage helpers ─────────────────────────────
    function getFavs()          { return JSON.parse(localStorage.getItem(LS_FAVS)     || '[]'); }
    function setFavs(a)         { localStorage.setItem(LS_FAVS, JSON.stringify(a)); }
    function isFav(id)          { return getFavs().includes(id); }
    function toggleFav(id)      { const f = getFavs(); const i = f.indexOf(id); i >= 0 ? f.splice(i,1) : f.push(id); setFavs(f); }
    function getPersonal()      { return JSON.parse(localStorage.getItem(LS_PERSONAL) || '[]'); }
    function setPersonal(a)     { localStorage.setItem(LS_PERSONAL, JSON.stringify(a)); }

    // ── Load shared templates ────────────────────────────
    async function loadTemplates() {
        try {
            const r = await fetch('templates.json?_=' + Date.now());
            const d = await r.json();
            sharedTemplates = d.templates || [];
        } catch (e) { sharedTemplates = []; }
        buildCatBar();
        renderList();
    }

    // ── Category bar ─────────────────────────────────────
    function buildCatBar() {
        const bar = document.getElementById('catBar');
        bar.innerHTML = '';
        const sharedCats = [...new Set(sharedTemplates.map(t => t.category))];
        const cats = ['★ Favourites', 'Mine', 'All', ...sharedCats];
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn'
                + (cat === '★ Favourites' ? ' cat-fav' : '')
                + (cat === 'Mine' ? ' cat-mine' : '')
                + (cat === activeCat ? ' active' : '');
            btn.textContent = cat;
            btn.addEventListener('click', () => { activeCat = cat; buildCatBar(); renderList(); });
            bar.appendChild(btn);
        });
    }

    // ── Template list ─────────────────────────────────────
    function renderList() {
        const list = document.getElementById('templateList');
        list.innerHTML = '';

        if (activeCat === 'Mine') {
            renderMineList(list);
            return;
        }

        let items;
        if (activeCat === '★ Favourites') {
            const favIds = getFavs();
            const all = [...sharedTemplates, ...getPersonal()];
            items = favIds.map(id => all.find(t => t.id === id)).filter(Boolean);
        } else if (activeCat === 'All') {
            items = sharedTemplates;
        } else {
            items = sharedTemplates.filter(t => t.category === activeCat);
        }

        if (!items.length) {
            list.innerHTML = '<p class="empty-msg">No templates here yet.</p>';
            return;
        }
        items.forEach(tpl => list.appendChild(makeSharedItem(tpl)));
    }

    function renderMineList(list) {
        const personal = getPersonal();
        const addBtn = document.createElement('button');
        addBtn.className = 'add-btn';
        addBtn.innerHTML = '+ New personal template';
        addBtn.addEventListener('click', () => openCreate(null));
        list.appendChild(addBtn);

        if (!personal.length) {
            const msg = document.createElement('p');
            msg.className = 'empty-msg';
            msg.textContent = 'No personal templates yet. Add one above.';
            list.appendChild(msg);
            return;
        }
        personal.forEach(tpl => list.appendChild(makePersonalItem(tpl)));
    }

    function makeSharedItem(tpl) {
        const item = document.createElement('div');
        item.className = 'tpl-item';

        const body = document.createElement('div');
        body.className = 'tpl-body';
        body.innerHTML = `<div class="tpl-name">${tpl.name}</div><div class="tpl-meta">${tpl.category}${tpl.subject ? ' · has subject' : ''}</div>`;
        body.addEventListener('click', () => openFill(tpl, false));

        const starBtn = document.createElement('button');
        starBtn.className = 'tpl-btn star' + (isFav(tpl.id) ? ' active' : '');
        starBtn.title = 'Favourite';
        starBtn.textContent = '★';
        starBtn.addEventListener('click', e => {
            e.stopPropagation();
            toggleFav(tpl.id);
            starBtn.classList.toggle('active', isFav(tpl.id));
            if (activeCat === '★ Favourites') renderList();
        });

        const actions = document.createElement('div');
        actions.className = 'tpl-actions';
        actions.appendChild(starBtn);

        item.appendChild(body);
        item.appendChild(actions);
        return item;
    }

    function makePersonalItem(tpl) {
        const item = document.createElement('div');
        item.className = 'tpl-item';

        const body = document.createElement('div');
        body.className = 'tpl-body';
        body.innerHTML = `<div class="tpl-name">${tpl.name}</div><div class="tpl-meta" style="color:#2563eb">${tpl.category} · personal${tpl.subject ? ' · has subject' : ''}</div>`;
        body.addEventListener('click', () => openFill(tpl, true));

        const starBtn = document.createElement('button');
        starBtn.className = 'tpl-btn star' + (isFav(tpl.id) ? ' active' : '');
        starBtn.title = 'Favourite';
        starBtn.textContent = '★';
        starBtn.addEventListener('click', e => {
            e.stopPropagation();
            toggleFav(tpl.id);
            starBtn.classList.toggle('active', isFav(tpl.id));
        });

        const editBtn = document.createElement('button');
        editBtn.className = 'tpl-btn edit';
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', e => { e.stopPropagation(); openCreate(tpl); });

        const delBtn = document.createElement('button');
        delBtn.className = 'tpl-btn del';
        delBtn.textContent = 'Delete';
        delBtn.addEventListener('click', e => {
            e.stopPropagation();
            confirmDelete(tpl.name, () => {
                const updated = getPersonal().filter(t => t.id !== tpl.id);
                setPersonal(updated);
                setFavs(getFavs().filter(id => id !== tpl.id));
                renderList();
            });
        });

        const actions = document.createElement('div');
        actions.className = 'tpl-actions';
        actions.appendChild(starBtn);
        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        item.appendChild(body);
        item.appendChild(actions);
        return item;
    }

    // ── FILL state ────────────────────────────────────────
    function openFill(tpl, isPersonal) {
        currentTemplate = tpl;

        document.getElementById('fillName').textContent = tpl.name;
        document.getElementById('fillEditBtn').classList.toggle('hidden', !isPersonal);

        // Subject
        const subjSec = document.getElementById('subjectSection');
        if (tpl.subject) {
            document.getElementById('subjectVal').value = tpl.subject;
            document.getElementById('applySubject').checked = false;
            subjSec.classList.remove('hidden');
        } else {
            subjSec.classList.add('hidden');
        }

        // Placeholder form
        const form = document.getElementById('placeholderForm');
        form.innerHTML = '';
        (tpl.placeholders || []).forEach(p => {
            const div = document.createElement('div');
            div.className = 'form-field';
            div.innerHTML = `
                <div class="field-label">${p.label}${p.optional ? ' <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span>' : ''}</div>
                <input type="text" class="text-input ph-input" data-key="${p.key}" autocomplete="off">
                ${p.hint ? `<div class="field-hint">${p.hint}</div>` : ''}
            `;
            form.appendChild(div);
        });
        form.querySelectorAll('.ph-input').forEach(i => i.addEventListener('input', updatePreview));

        updatePreview();
        show('stateFill');
    }

    function updatePreview() {
        if (!currentTemplate) return;
        const values = getValues();

        const html = currentTemplate.body.replace(/\{([A-Z_]+)\}/g, (match, key) => {
            const val = values[key];
            if (val && val.trim() !== '') return `<span class="filled">${esc(val)}</span>`;
            return `<span class="unfilled">${match}</span>`;
        });
        document.getElementById('preview').innerHTML = html;

        const allFilled = (currentTemplate.placeholders || [])
            .filter(p => !p.optional)
            .every(p => (values[p.key] || '').trim() !== '');
        document.getElementById('insertBtn').disabled = !allFilled;
    }

    function getValues() {
        const vals = {};
        document.querySelectorAll('.ph-input').forEach(i => { vals[i.dataset.key] = i.value; });
        return vals;
    }

    function fillTpl(body, values) {
        return body.replace(/\{([A-Z_]+)\}/g, (m, k) => values[k] !== undefined ? values[k] : m);
    }

    document.getElementById('insertBtn').addEventListener('click', async () => {
        if (!currentTemplate) return;
        const text = fillTpl(currentTemplate.body, getValues());
        const html = textToHtml(text);
        const btn  = document.getElementById('insertBtn');
        const stat = document.getElementById('status');

        if (currentTemplate.subject && document.getElementById('applySubject').checked) {
            const subj = document.getElementById('subjectVal').value.trim();
            if (officeReady && Office.context?.mailbox)
                Office.context.mailbox.item.subject.setAsync(subj, () => {});
        }

        if (officeReady && Office.context?.mailbox) {
            Office.context.mailbox.item.body.setSelectedDataAsync(html,
                { coercionType: Office.CoercionType.Html },
                result => {
                    if (result.status === Office.AsyncResultStatus.Succeeded) {
                        btn.textContent = 'Inserted!';
                        btn.classList.add('success');
                        setTimeout(async () => {
                            btn.textContent = 'Insert into email';
                            btn.classList.remove('success');
                            try { if (Office.addin?.hide) await Office.addin.hide(); } catch(e) {}
                        }, 800);
                    } else { showStatus('Insert failed — try again.', true); }
                });
        } else {
            showPreviewModal(text);
        }
    });

    document.getElementById('fillBack').addEventListener('click', () => show('stateBrowse'));
    document.getElementById('fillEditBtn').addEventListener('click', () => openCreate(currentTemplate));

    // ── CREATE / EDIT state ───────────────────────────────
    const CATS_FOR_SELECT = [...SHARED_CATS];

    function openCreate(tpl) {
        editingPersonalId = tpl ? tpl.id : null;
        document.getElementById('createTitle').textContent = tpl ? 'Edit template' : 'New personal template';

        // Populate category dropdown
        const sel = document.getElementById('cCat');
        sel.innerHTML = '';
        CATS_FOR_SELECT.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            if (tpl && c === tpl.category) opt.selected = true;
            sel.appendChild(opt);
        });

        document.getElementById('cName').value    = tpl ? tpl.name    : '';
        document.getElementById('cSubject').value = tpl ? (tpl.subject || '') : '';
        const bodyEl = document.getElementById('cBody');
        bodyEl.value = tpl ? tpl.body : '';

        // Store current placeholders so labels survive re-detection
        createPhs = tpl ? (tpl.placeholders || []) : [];
        syncCreatePhs();

        show('stateCreate');
    }

    let createPhs = [];

    document.getElementById('cBody').addEventListener('input', syncCreatePhs);

    function syncCreatePhs() {
        const body = document.getElementById('cBody').value;
        const found = [];
        const regex = /\{([A-Z][A-Z0-9_]*)\}/g;
        let m;
        while ((m = regex.exec(body)) !== null) {
            if (!found.includes(m[1])) found.push(m[1]);
        }
        const existMap = {};
        createPhs.forEach(p => { existMap[p.key] = p; });
        createPhs = found.map(key => existMap[key] || { key, label: humanize(key), hint: '', optional: false });
        renderCreatePhs();
    }

    function renderCreatePhs() {
        const container = document.getElementById('cPhContent');
        container.innerHTML = '';
        if (!createPhs.length) {
            container.innerHTML = '<span class="ph-none">None yet — add {KEY} tokens to the body above.</span>';
            return;
        }
        const tbl = document.createElement('table');
        tbl.className = 'ph-table';
        tbl.innerHTML = '<thead><tr><th>Token</th><th>Label shown to user</th><th>Hint</th></tr></thead>';
        const tbody = document.createElement('tbody');
        createPhs.forEach((ph, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>{${ph.key}}</td>
                <td><input class="td-inp" type="text" value="${esc(ph.label)}" placeholder="Label"></td>
                <td><input class="td-inp" type="text" value="${esc(ph.hint||'')}" placeholder="e.g. Feb 2026"></td>
            `;
            const [,lbl,hint] = tr.querySelectorAll('input');
            lbl.addEventListener('input',  () => { createPhs[i].label = lbl.value; });
            hint.addEventListener('input', () => { createPhs[i].hint  = hint.value; });
            tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        container.appendChild(tbl);
    }

    document.getElementById('savePersonalBtn').addEventListener('click', () => {
        const name = document.getElementById('cName').value.trim();
        if (!name) { alert('Please enter a template name.'); return; }
        const body = document.getElementById('cBody').value.trim();
        if (!body) { alert('Please enter a body.'); return; }

        const personal = getPersonal();
        const tpl = {
            id:           editingPersonalId || ('personal_' + Date.now()),
            name,
            category:     document.getElementById('cCat').value,
            subject:      document.getElementById('cSubject').value.trim(),
            body,
            placeholders: createPhs.map(p => ({ ...p }))
        };

        if (editingPersonalId) {
            const idx = personal.findIndex(t => t.id === editingPersonalId);
            if (idx >= 0) personal[idx] = tpl; else personal.push(tpl);
        } else {
            personal.push(tpl);
        }
        setPersonal(personal);
        activeCat = 'Mine';
        buildCatBar();
        renderList();
        show('stateBrowse');
    });

    document.getElementById('createBack').addEventListener('click', () => {
        buildCatBar();
        renderList();
        show('stateBrowse');
    });

    // ── Utilities ─────────────────────────────────────────
    function show(stateId) {
        ['stateBrowse','stateFill','stateCreate'].forEach(id =>
            document.getElementById(id).classList.toggle('hidden', id !== stateId));
    }

    function showStatus(msg, isErr) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status' + (isErr ? ' err' : '');
        setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 3000);
    }

    function humanize(key) {
        const words = key.toLowerCase().split('_');
        words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
        return words.join(' ');
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function textToHtml(text) {
        function e(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        return text.split(/\n\n+/).map(p => {
            const lines = p.split('\n');
            if (lines.length > 1 && lines.every(l => l.trim().startsWith('- '))) {
                return '<ul style="margin:0 0 0.75em 1.2em;padding:0">' +
                    lines.map(l => '<li>' + e(l.trim().slice(2)) + '</li>').join('') + '</ul>';
            }
            return '<p style="margin:0 0 0.75em 0">' + lines.map(e).join('<br>') + '</p>';
        }).join('');
    }

    // ── Office init ───────────────────────────────────────
    if (typeof Office !== 'undefined') {
        Office.onReady(() => { officeReady = true; });
    }

    // ── Delete confirmation dialog ────────────────────────
    function confirmDelete(name, onConfirm) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:1.5rem';

        const box = document.createElement('div');
        box.style.cssText = 'background:white;border-radius:6px;width:100%;max-width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.22);overflow:hidden';

        const head = document.createElement('div');
        head.style.cssText = 'background:#b91c1c;color:white;padding:0.7rem 1rem;font-size:0.8rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase';
        head.textContent = 'Delete template';

        const msg = document.createElement('p');
        msg.style.cssText = 'padding:1rem;font-size:0.85rem;color:#1a1a1a;line-height:1.5';
        msg.textContent = `Are you sure you want to delete "${name}"? This cannot be undone.`;

        const foot = document.createElement('div');
        foot.style.cssText = 'display:flex;gap:0.5rem;padding:0 1rem 1rem';

        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = 'Cancel';
        cancelBtn.style.cssText = 'flex:1;padding:0.55rem;border-radius:4px;border:1.5px solid #ccc;background:white;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:inherit';

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Yes, delete';
        deleteBtn.style.cssText = 'flex:1;padding:0.55rem;border-radius:4px;border:none;background:#b91c1c;color:white;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:inherit';

        foot.appendChild(cancelBtn);
        foot.appendChild(deleteBtn);
        box.appendChild(head);
        box.appendChild(msg);
        box.appendChild(foot);
        overlay.appendChild(box);
        document.body.appendChild(overlay);

        const close = () => document.body.removeChild(overlay);
        cancelBtn.addEventListener('click', close);
        overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
        deleteBtn.addEventListener('click', () => { close(); onConfirm(); });
    }

    // ── Browser preview modal ─────────────────────────────
    function showPreviewModal(text) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem';

        const box = document.createElement('div');
        box.style.cssText = 'background:white;border-radius:6px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.25)';

        const head = document.createElement('div');
        head.style.cssText = 'background:#2b5a39;color:white;padding:0.75rem 1rem;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:space-between';
        head.innerHTML = '<span style="font-size:0.82rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase">Preview — this is what goes into the email</span>';

        const closeBtn = document.createElement('button');
        closeBtn.textContent = '✕';
        closeBtn.style.cssText = 'background:none;border:none;color:white;font-size:1rem;cursor:pointer;padding:0 0.2rem;opacity:0.8';
        closeBtn.addEventListener('click', () => document.body.removeChild(overlay));
        head.appendChild(closeBtn);

        const body = document.createElement('div');
        body.style.cssText = 'padding:1rem;overflow-y:auto;font-size:0.88rem;line-height:1.75;white-space:pre-wrap;color:#1a1a1a;flex:1';
        body.textContent = text;

        const foot = document.createElement('div');
        foot.style.cssText = 'padding:0.75rem 1rem;border-top:1px solid #e5e5e5;font-size:0.75rem;color:#888;text-align:center';
        foot.textContent = 'In Outlook this inserts directly into your email — no clipboard needed.';

        box.appendChild(head);
        box.appendChild(body);
        box.appendChild(foot);
        overlay.appendChild(box);
        overlay.addEventListener('click', e => { if (e.target === overlay) document.body.removeChild(overlay); });
        document.body.appendChild(overlay);
    }

    loadTemplates();
</script>
</body>
</html>
